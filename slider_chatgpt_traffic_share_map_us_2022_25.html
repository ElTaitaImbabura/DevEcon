<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatGPT Global Traffic Share Flow Map (2022-2025)</title>

  <style>
    :root {
      --bg: #f4f4f4;
      --panel: rgba(255,255,255,0.92);
      --text: #161616;
      --muted: #5c5c5c;
      --accent: #111;
      --green: #0b7d2d;
      --orange: #e59a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1560px;
      margin: 0 auto;
      padding: 14px 18px 20px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
    }
    .year-block {
      display: grid;
      gap: 8px;
    }
    .year-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .year-value {
      min-width: 64px;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .range {
      width: 100%;
      accent-color: var(--green);
    }
    .ticks {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      padding: 0 2px;
    }
    .stat {
      min-width: 168px;
      text-align: right;
    }
    .stat .label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stat .value {
      font-size: 22px;
      font-weight: 700;
      margin-top: 2px;
    }
    #map {
      width: 100%;
      height: 760px;
      border-radius: 18px;
      overflow: hidden;
    }
    @media (max-width: 980px) {
      .controls {
        grid-template-columns: 1fr;
      }
      .stat {
        text-align: left;
      }
      #map {
        height: 620px;
      }
    }
  </style>
</head>

  <div class="wrap">
    <div class="topbar">

        <div class="sub">Traffic share by country for 2022-2025. Every flow connects into the United States.</div>
      </div>

    <div class="panel">

        <div class="year-block">
          <div class="year-row">
            <div class="year-value" id="yearValue">2022</div>
            <input id="yearSlider" class="range" type="range" min="2022" max="2025" step="1" value="2022" />
          </div>
          <div class="ticks">
            <span>2022</span>
            <span>2023</span>
            <span>2024</span>
            <span>2025</span>
          </div>
        </div>
        <div class="stat">

          <div class="value" id="countryCount">0</div>
        </div>
        <div class="stat">
          <div class="label">Largest traffic source</div>
          <div class="value" id="topCountry">-</div>
        </div>
      </div>
      <div id="map"></div>
    </div>

    const fmtPercent = (value) => value == null ? "—" : `${(value * 100).toFixed(2)}%`;
    const fmtInt = (value) => value == null ? "—" : new Intl.NumberFormat("en-US").format(value);
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

    function normalizeLon(lon, hubLon) {
      let out = lon;
      while (out - hubLon > 180) out -= 360;
      while (hubLon - out > 180) out += 360;
      return out;
    }

    function makeArcPoints(sourceLon, sourceLat, targetLon, targetLat, steps = 28) {
      const lon1 = normalizeLon(sourceLon, targetLon);
      const lon2 = targetLon;
      const lat1 = sourceLat;
      const lat2 = targetLat;
      const midLon = (lon1 + lon2) / 2;
      const lift = 10 + Math.min(35, Math.abs(lon1 - lon2) * 0.10);
      const midLat = clamp((lat1 + lat2) / 2 + lift, -75, 85);

      const lons = [];
      const lats = [];
      for (let i = 0; i <= steps; i += 1) {
        const t = i / steps;
        const omt = 1 - t;
        const lon = omt * omt * lon1 + 2 * omt * t * midLon + t * t * lon2;
        const lat = omt * omt * lat1 + 2 * omt * t * midLat + t * t * lat2;
        lons.push(lon);
        lats.push(lat);
      }
      return { lons, lats };
    }

    function buildFigure(year) {
      const rows = (dataByYear[String(year)] || []).filter(d => d.lat != null && d.lon != null && d.traffic_share != null);
      const top = rows[0];
      document.getElementById("countryCount").textContent = String(rows.length);
      document.getElementById("topCountry").textContent = top ? top.country : "—";

      const maxShare = Math.max(...rows.map(d => d.traffic_share), 0.0001);

      const choropleth = {
        type: "choropleth",
        locationmode: "country names",
        locations: rows.map(d => d.country),
        z: rows.map(d => d.traffic_share),
        zmin: 0,
        zmax: maxShare,
        colorscale: [
          [0, "#f8d0c8"],
          [0.2, "#f2a18f"],
          [0.4, "#eb654c"],
          [0.6, "#d62828"],
          [0.8, "#a90024"],
          [1, "#067d31"]
        ],
        marker: {
          line: { color: "#d9d9d9", width: 0.3 }
        },
        colorbar: {
          title: "Traffic Share",
          tickformat: ".1%",
          len: 0.6,
          thickness: 14
        },
        hovertemplate: "<b>%{location}</b><br>Traffic share: %{z:.2%}<extra></extra>"
      };

      const lineTraces = rows.map((d, idx) => {
        const arc = makeArcPoints(d.lon, d.lat, hub.lon, hub.lat, 28);
        return {
          type: "scattergeo",
          mode: "lines",
          lon: arc.lons,
          lat: arc.lats,
          line: {
            width: 0.5 + 8.5 * Math.sqrt(d.traffic_share / maxShare),
            color: idx < 8 ? "rgba(0,0,0,0.82)" : "rgba(90,90,90,0.33)"
          },
          hoverinfo: "skip",
          showlegend: false
        };
      });

      const markers = {
        type: "scattergeo",
        mode: "markers",
        lon: rows.map(d => d.lon),
        lat: rows.map(d => d.lat),
        text: rows.map(d =>
          `<b>${d.country}</b><br>` +
          `Traffic share: ${fmtPercent(d.traffic_share)}<br>` +
          `Visits: ${fmtInt(d.visits)}<br>` +
          `Unique visitors: ${fmtInt(d.unique_visitors)}<br>` +
          `Desktop share: ${fmtPercent(d.desktop_share)}<br>` +
          `Mobile share: ${fmtPercent(d.mobile_share)}<br>` +
          `Pages / visit: ${d.pages_per_visit?.toFixed(2) ?? "—"}<br>` +
          `Average visit duration: ${d.avg_visit_duration || "—"}<br>` +
          `Bounce rate: ${fmtPercent(d.bounce_rate)}`
        ),
        hovertemplate: "%{text}<extra></extra>",
        marker: {
          size: rows.map(d => 4 + 42 * Math.sqrt(d.traffic_share / maxShare)),
          color: "#e59a00",
          opacity: 0.96,
          line: { color: "#111111", width: 1.5 }
        },
        showlegend: false
      };

      const hubTrace = {
        type: "scattergeo",
        mode: "markers+text",
        lon: [hub.lon],
        lat: [hub.lat],
        text: ["United States"],
        textposition: "bottom center",
        hovertemplate: "<b>United States</b><br>Hub country<extra></extra>",
        marker: {
          size: 16,
          color: "#0b7d2d",
          line: { color: "#ffffff", width: 1.8 }
        },
        textfont: {
          size: 12,
          color: "#111111"
        },
        showlegend: false
      };

      const layout = {
        paper_bgcolor: "#f4f4f4",
        plot_bgcolor: "#f4f4f4",
        margin: { l: 10, r: 10, t: 10, b: 10 },
        geo: {
          scope: "world",
          projection: { type: "equirectangular" },
          showframe: false,
          showcoastlines: false,
          showcountries: true,
          countrycolor: "#d0d0d0",
          showland: true,
          landcolor: "#d6d6d6",
          showocean: true,
          oceancolor: "#f4f4f4",
          bgcolor: "#f4f4f4",
          lataxis: { range: [-58, 85] },
          lonaxis: { range: [-180, 180] }
        },
        annotations: [{
          x: 0.995,
          y: 0.02,
          xref: "paper",
          yref: "paper",
          xanchor: "right",
          yanchor: "bottom",
          text: `Year: <b>${year}</b>`,
          showarrow: false,
          font: { size: 16, color: "#111" }
        }]
      };

      return { data: [choropleth, ...lineTraces, markers, hubTrace], layout };
    }

    const mapEl = document.getElementById("map");
    const yearSlider = document.getElementById("yearSlider");
    const yearValue = document.getElementById("yearValue");

    function render(year) {
      yearValue.textContent = String(year);
      const fig = buildFigure(year);
      Plotly.react(mapEl, fig.data, fig.layout, { responsive: true, displayModeBar: false });
    }

    yearSlider.addEventListener("input", (event) => {
      render(Number(event.target.value));
    });

    render(2022);
  </script>
